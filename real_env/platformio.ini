	https://github.com/arduino-libraries/MadgwickAHRS.git
	https://github.com/aed3/PS4-esp32.git
	coryjfowler/mcp_can@^1.5.1
	wollewald/INA226_WE @ ^1.2.9   ; ←これを追加
monitor_speed = 115200